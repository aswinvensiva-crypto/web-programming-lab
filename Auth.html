<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hotel Manager – Sign In</title>
<link rel="stylesheet" href="_shared.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; background: var(--bg); overflow: hidden; }
  .orb1 { width: 500px; height: 500px; top: -200px; right: -200px; }
  .orb2 { width: 400px; height: 400px; bottom: -180px; left: -180px; background: var(--warning); }
  .orb3 { width: 300px; height: 300px; top: 35%; left: 25%; }
  .auth-card {
    width: 100%; max-width: 440px; z-index: 10;
    background: rgba(19,19,26,0.85); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 36px;
    backdrop-filter: blur(24px);
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
  }
  .auth-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 18px; display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 20px;
    box-shadow: 0 0 40px var(--primary-glow);
  }
  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px; text-align: center;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px; margin-bottom: 6px;
  }
  .auth-subtitle { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .submit-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 6px 20px var(--primary-glow);
    transition: opacity .2s, transform .2s;
    margin-top: 8px;
  }
  .submit-btn:hover { opacity: .88; transform: translateY(-1px); }
</style>
</head>
<body>
  <div class="orb orb-purple orb1"></div>
  <div class="orb orb-pink orb2"></div>
  <div class="orb orb-purple orb3"></div>

  <div class="auth-card">
    <div class="auth-logo">🏨</div>
    <div class="auth-title">HOTEL MANAGER</div>
    <div class="auth-subtitle">Hotel Room Booking Management</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('signin', this)">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup', this)">Sign Up</button>
    </div>

    <!-- Sign In -->
    <div id="tab-signin" class="tab-content active">
      <form onsubmit="handleAuth(event, 'signin')">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="submit-btn" id="btn-signin">Sign In</button>
      </form>
    </div>

    <!-- Sign Up -->
    <div id="tab-signup" class="tab-content">
      <form onsubmit="handleAuth(event, 'signup')">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Min 6 characters" minlength="6" required />
        </div>
        <button type="submit" class="submit-btn" id="btn-signup">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    function switchTab(tab, el) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }
    function handleAuth(e, type) {
      e.preventDefault();
      const btn = document.getElementById('btn-' + type);
      btn.textContent = type === 'signin' ? 'Signing in...' : 'Creating account...';
      btn.disabled = true;
      setTimeout(() => {
        alert(type === 'signin' ? 'Signed in successfully!' : 'Account created! Please check your email.');
        btn.textContent = type === 'signin' ? 'Sign In' : 'Create Account';
        btn.disabled = false;
        if (type === 'signin') window.location.href = 'Dashboard.html';
      }, 1200);
    }
  </script>
</body>
</html>
