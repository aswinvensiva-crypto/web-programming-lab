<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 – Page Not Found</title>
<link rel="stylesheet" href="_shared.css" />
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
  .notfound-wrap { text-align:center; z-index:10; position:relative; padding:40px; }
  .big-404 {
    font-family:'Playfair Display',serif;
    font-size:140px; font-weight:800; line-height:1;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:16px;
  }
  .nf-title { font-size:24px; font-weight:600; margin-bottom:10px; }
  .nf-sub { color:var(--muted); font-size:15px; margin-bottom:36px; }
  .orb1 { width:400px; height:400px; top:-100px; right:-100px; }
  .orb2 { width:300px; height:300px; bottom:-80px; left:-80px; background:var(--accent); }
</style>
</head>
<body>
  <div class="orb orb-purple orb1"></div>
  <div class="orb orb-pink orb2"></div>

  <div class="notfound-wrap">
    <div class="big-404">404</div>
    <div class="nf-title">Oops! Page not found</div>
    <div class="nf-sub">The page you're looking for doesn't exist or has been moved.</div>
    <a href="Dashboard.html" class="btn btn-primary">🏠 Return to Dashboard</a>
  </div>
</body>
</html>
