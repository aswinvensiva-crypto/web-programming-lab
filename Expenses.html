<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Expenses – Hotel Manager</title>
<link rel="stylesheet" href="_shared.css" />
</head>
<body>
<script src="_sidebar.js"></script>
<script>injectSidebar('Expenses');</script>

<main class="main">
  <div class="page-header">
    <div><div class="page-title">Expenses</div></div>
    <button class="btn btn-primary" onclick="openDialog()">➕ Add Expense</button>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">All Expenses</div></div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Date</th><th>Type</th><th>Description</th><th style="text-align:right">Amount</th><th style="text-align:right">Actions</th></tr>
          </thead>
          <tbody id="expenses-tbody"></tbody>
          <tfoot>
            <tr>
              <td colspan="3" style="font-weight:700;font-size:15px;padding:14px 16px">Total</td>
              <td style="text-align:right;font-family:'Playfair Display',serif;font-size:18px;font-weight:800;color:var(--primary)" id="total-amount">₹0</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Dialog -->
<div class="overlay" id="dialog-overlay">
  <div class="dialog">
    <div class="dialog-title">Add New Expense</div>
    <form onsubmit="handleSave(event)">
      <div class="form-group">
        <label class="form-label">Expense Type</label>
        <select class="form-select" id="f-type" onchange="toggleOther()">
          <option value="tea">Tea</option>
          <option value="maintenance">Maintenance</option>
          <option value="cleaning">Cleaning</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group" id="other-field" style="display:none">
        <label class="form-label">Specify</label>
        <input class="form-input" id="f-other" placeholder="Type of expense…" />
      </div>
      <div class="form-group">
        <label class="form-label">Amount (₹)</label>
        <input type="number" class="form-input" id="f-amount" min="0" step="0.01" required />
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="f-date" required />
      </div>
      <div class="form-group">
        <label class="form-label">Description (Optional)</label>
        <textarea class="form-textarea" id="f-desc" rows="3" placeholder="Additional details…"></textarea>
      </div>
      <div class="flex-gap">
        <button type="submit" class="btn btn-primary" style="flex:1">Add Expense</button>
        <button type="button" class="btn btn-outline" onclick="closeDialog()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
let expenses = [
  { id:1, type:'tea', other:null, amount:450, date:'2026-03-25', desc:'Morning tea supplies' },
  { id:2, type:'maintenance', other:null, amount:3200, date:'2026-03-24', desc:'AC servicing room 201' },
  { id:3, type:'cleaning', other:null, amount:1800, date:'2026-03-23', desc:'Deep cleaning all rooms' },
  { id:4, type:'other', other:'Laundry', amount:2100, date:'2026-03-22', desc:'Linen washing' },
  { id:5, type:'maintenance', other:null, amount:8500, date:'2026-03-20', desc:'Plumbing repair' },
];
let nextId = 6;

function typeName(e) { return e.type === 'other' ? e.other : e.type.charAt(0).toUpperCase() + e.type.slice(1); }
function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

function render() {
  const tbody = document.getElementById('expenses-tbody');
  if (!expenses.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:40px">No expenses found</td></tr>`;
    document.getElementById('total-amount').textContent = '₹0';
    return;
  }
  tbody.innerHTML = expenses.map(e => `
    <tr>
      <td>${new Date(e.date).toLocaleDateString('en-IN')}</td>
      <td><span class="badge badge-primary">${typeName(e)}</span></td>
      <td style="color:var(--muted)">${e.desc || '–'}</td>
      <td style="text-align:right"><strong>${fmt(e.amount)}</strong></td>
      <td style="text-align:right">
        <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--danger)" onclick="deleteExpense(${e.id})" title="Delete">🗑️</button>
      </td>
    </tr>
  `).join('');
  const total = expenses.reduce((s,e) => s + e.amount, 0);
  document.getElementById('total-amount').textContent = fmt(total);
}

function openDialog() {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-amount').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-type').value = 'tea';
  document.getElementById('other-field').style.display = 'none';
  document.getElementById('dialog-overlay').classList.add('open');
}
function closeDialog() { document.getElementById('dialog-overlay').classList.remove('open'); }
function toggleOther() {
  document.getElementById('other-field').style.display = document.getElementById('f-type').value === 'other' ? 'block' : 'none';
}
function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  expenses = expenses.filter(e => e.id !== id);
  render();
}
function handleSave(e) {
  e.preventDefault();
  expenses.unshift({
    id: nextId++,
    type: document.getElementById('f-type').value,
    other: document.getElementById('f-other').value || null,
    amount: parseFloat(document.getElementById('f-amount').value),
    date: document.getElementById('f-date').value,
    desc: document.getElementById('f-desc').value,
  });
  closeDialog();
  render();
}

render();
</script>
</body>
</html>
