<!DOCTYPE html>
<html>
<head>
  <title>Product Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Product Cards</h2>

<div class="card-container">

  <div class="card">
    <h3>Notebook</h3>
    <p class="price">₹120</p>
    <p>Simple ruled notebook for students.</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Pen</h3>
    <p class="price">₹20</p>
    <p>Smooth writing blue pen.</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Backpack</h3>
    <p class="price">₹999</p>
    <p>Lightweight school backpack.</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Water Bottle</h3>
    <p class="price">₹250</p>
    <p>1 litre reusable bottle.</p>
    <button>Buy Now</button>
  </div>

</div>

</body>
</html>
