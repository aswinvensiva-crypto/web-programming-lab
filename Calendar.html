<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar – Hotel Manager</title>
<link rel="stylesheet" href="_shared.css" />
<style>
  .month-nav { display:flex; align-items:center; gap:12px; }
  .month-nav span { font-size:16px; font-weight:700; min-width:160px; text-align:center; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; margin-top:16px; }
  .cal-day-name { text-align:center; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:8px 0; }
  .cal-cell {
    border:1px solid var(--border); border-radius:10px; padding:10px 8px; min-height:90px;
    background:var(--surface); font-size:12px; transition:border-color .2s;
  }
  .cal-cell:hover { border-color:var(--primary); }
  .cal-cell.has-booking { background:rgba(167,139,250,0.06); }
  .cal-cell.today { border-color:var(--primary); }
  .day-num { font-size:13px; font-weight:700; margin-bottom:6px; }
  .booking-chip {
    display:block; background:rgba(167,139,250,0.2); color:var(--primary);
    border-radius:5px; padding:2px 6px; font-size:11px; font-weight:600;
    margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .avail-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
  .avail-card { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .avail-cat { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .avail-num { font-family:'Playfair Display',serif; font-size:32px; font-weight:800; color:var(--primary); }
  .avail-sub { font-size:12px; color:var(--muted); margin-top:4px; }
  .stat-mini { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .mini-room { font-weight:600; font-size:14px; }
  .mini-stat { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-top:6px; }
  .mini-stat strong { color:var(--text); }
</style>
</head>
<body>
<script src="_sidebar.js"></script>
<script>injectSidebar('Calendar');</script>

<main class="main">
  <div class="page-header">
    <div><div class="page-title">Monthly Calendar</div></div>
    <div class="month-nav">
      <button class="btn btn-outline btn-sm" onclick="changeMonth(-1)">← Prev</button>
      <span id="month-label"></span>
      <button class="btn btn-outline btn-sm" onclick="changeMonth(1)">Next →</button>
    </div>
  </div>

  <!-- Occupancy Stats -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-header">
      <div class="card-title">Room Occupancy Statistics</div>
      <select class="form-select" style="width:200px" id="room-filter" onchange="renderCalendar()">
        <option value="all">All Rooms</option>
        <option>101 – Presidential Suite</option>
        <option>201 – Ocean Suite</option>
        <option>301 – Deluxe King</option>
        <option>401 – Ultra Deluxe</option>
        <option>501 – Standard Double</option>
      </select>
    </div>
    <div class="card-body">
      <div class="stat-grid" id="room-stats"></div>
    </div>
  </div>

  <!-- Availability by Category -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-header">
      <div class="card-title">Room Availability by Category</div>
      <input type="date" class="form-input" style="width:180px" id="avail-date" onchange="renderAvailability()" />
    </div>
    <div class="card-body">
      <div class="avail-grid" id="avail-grid"></div>
    </div>
  </div>

  <!-- Calendar Grid -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-header"><div class="card-title">Daily Occupancy View</div></div>
    <div class="card-body">
      <div class="cal-grid" id="cal-header"></div>
      <div class="cal-grid" id="cal-body"></div>
    </div>
  </div>
</main>

<script>
let currentMonth = new Date();
currentMonth.setDate(1);

const sampleBookings = [
  { room: '101', customer: 'Aravind S.', checkIn: new Date().setDate(1), nights: 5 },
  { room: '201', customer: 'Priya N.', checkIn: new Date().setDate(8), nights: 4 },
  { room: '301', customer: 'Rajan M.', checkIn: new Date().setDate(12), nights: 6 },
  { room: '401', customer: 'Sowmya K.', checkIn: new Date().setDate(18), nights: 3 },
  { room: '101', customer: 'Vikram P.', checkIn: new Date().setDate(22), nights: 4 },
  { room: '201', customer: 'Meera L.', checkIn: new Date().setDate(3), nights: 7 },
];

const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function changeMonth(dir) {
  currentMonth.setMonth(currentMonth.getMonth() + dir);
  renderAll();
}

function renderAll() {
  document.getElementById('month-label').textContent = monthNames[currentMonth.getMonth()] + ' ' + currentMonth.getFullYear();
  renderCalendar();
  renderRoomStats();
  renderAvailability();
}

function renderCalendar() {
  const header = document.getElementById('cal-header');
  header.innerHTML = dayNames.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  const body = document.getElementById('cal-body');
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
    const bookingsOnDay = sampleBookings.filter(b => {
      const start = new Date(b.checkIn);
      const end = new Date(start); end.setDate(end.getDate() + b.nights);
      const day = new Date(year, month, d);
      return day >= start && day < end;
    });
    const chips = bookingsOnDay.map(b => `<span class="booking-chip" title="${b.customer}">🛏 ${b.room}</span>`).join('');
    cells += `<div class="cal-cell ${isToday?'today':''} ${bookingsOnDay.length?'has-booking':''}">
      <div class="day-num">${d}</div>${chips}</div>`;
  }
  body.innerHTML = cells;
}

function renderRoomStats() {
  const rooms = ['101 – Presidential','201 – Ocean Suite','301 – Deluxe King','401 – Ultra Deluxe','501 – Standard'];
  const booked = [18, 14, 22, 16, 26];
  const total = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 0).getDate();
  document.getElementById('room-stats').innerHTML = rooms.map((r,i) => `
    <div class="stat-mini">
      <div class="mini-room">${r}</div>
      <div class="mini-stat"><span>Days Booked</span><strong>${booked[i]} days</strong></div>
      <div class="mini-stat"><span>Revenue</span><strong style="color:var(--primary)">₹${(booked[i]*3200).toLocaleString('en-IN')}</strong></div>
      <div class="mini-stat"><span>Occupancy</span><strong>${Math.round(booked[i]/total*100)}%</strong></div>
    </div>
  `).join('');
}

function renderAvailability() {
  const categories = [
    { label: 'Standard', total: 4, booked: 2 },
    { label: 'Deluxe', total: 3, booked: 1 },
    { label: 'Ultra Deluxe', total: 2, booked: 1 },
    { label: 'Suite', total: 2, booked: 2 },
    { label: 'Presidential', total: 1, booked: 0 },
  ];
  document.getElementById('avail-grid').innerHTML = categories.map(c => {
    const avail = c.total - c.booked;
    let status = avail === 0 ? '<span style="color:var(--danger);font-weight:600">Fully booked</span>' :
      avail === c.total ? '<span style="color:var(--success);font-weight:600">All available</span>' :
      `<span style="color:var(--muted)">${c.booked} booked</span>`;
    return `<div class="avail-card">
      <div class="avail-cat">${c.label}</div>
      <div class="avail-num">${avail}</div>
      <div class="avail-sub">/ ${c.total} rooms</div>
      <div style="margin-top:8px;font-size:12px">${status}</div>
    </div>`;
  }).join('');
}

// Init
document.getElementById('avail-date').value = new Date().toISOString().split('T')[0];
renderAll();
</script>
</body>
</html>
