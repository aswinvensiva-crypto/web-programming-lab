<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>User Management – Hotel Manager</title>
<link rel="stylesheet" href="_shared.css" />
<style>
  .role-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600;
    cursor:default;
  }
  .role-admin { background:rgba(167,139,250,0.2); color:var(--primary); border:1px solid rgba(167,139,250,0.3); }
  .role-staff { background:rgba(52,211,153,0.15); color:var(--success); border:1px solid rgba(52,211,153,0.3); }
  .remove-role { background:none; border:none; cursor:pointer; color:inherit; opacity:.7; font-size:14px; padding:0 0 0 4px; }
  .remove-role:hover { opacity:1; color:var(--danger); }
  .assign-inline { display:flex; align-items:center; gap:8px; }
</style>
</head>
<body>
<script src="_sidebar.js"></script>
<script>injectSidebar('Users');</script>

<main class="main">
  <div class="page-header">
    <div><div class="page-title">User Management</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span style="margin-right:8px">🔐</span> Users &amp; Roles
      </div>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Email</th><th>Roles</th><th>Joined</th><th style="text-align:right">Actions</th></tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
let users = [
  { id:1, email:'admin@hotelmanager.in', roles:['admin'], joined:'2024-01-15' },
  { id:2, email:'frontdesk@hotelmanager.in', roles:['staff'], joined:'2024-03-01' },
  { id:3, email:'manager@hotelmanager.in', roles:['admin','staff'], joined:'2024-02-10' },
  { id:4, email:'housekeeping@hotelmanager.in', roles:[], joined:'2025-01-05' },
  { id:5, email:'accounts@hotelmanager.in', roles:['staff'], joined:'2025-06-12' },
];

let assigningId = null;

function render() {
  const tbody = document.getElementById('users-tbody');
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:40px">No users found</td></tr>`;
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.email}</strong></td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${u.roles.length === 0 ? `<span style="color:var(--muted);font-size:13px">No roles</span>` :
            u.roles.map(r => `
              <span class="role-badge role-${r}">
                🛡 ${r}
                <button class="remove-role" onclick="removeRole(${u.id},'${r}')" title="Remove role">✕</button>
              </span>
            `).join('')}
        </div>
      </td>
      <td style="color:var(--muted)">${new Date(u.joined).toLocaleDateString('en-IN')}</td>
      <td style="text-align:right">
        ${assigningId === u.id ? `
          <div class="assign-inline">
            <select class="form-select" id="role-select-${u.id}" style="width:110px">
              <option value="admin">Admin</option>
              <option value="staff">Staff</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="assignRole(${u.id})">Assign</button>
            <button class="btn btn-ghost btn-sm" onclick="cancelAssign()">Cancel</button>
          </div>
        ` : `
          <button class="btn btn-outline btn-sm" onclick="startAssign(${u.id})">👤+ Add Role</button>
        `}
      </td>
    </tr>
  `).join('');
}

function startAssign(id) { assigningId = id; render(); }
function cancelAssign() { assigningId = null; render(); }

function assignRole(userId) {
  const role = document.getElementById('role-select-' + userId).value;
  const user = users.find(u => u.id === userId);
  if (user.roles.includes(role)) { alert('User already has this role.'); return; }
  user.roles.push(role);
  assigningId = null;
  render();
}

function removeRole(userId, role) {
  const user = users.find(u => u.id === userId);
  user.roles = user.roles.filter(r => r !== role);
  render();
}

render();
</script>
</body>
</html>
