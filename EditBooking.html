<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Edit Booking – Hotel Manager</title>
<link rel="stylesheet" href="_shared.css" />
<style>
  .summary-row { display:flex; justify-content:space-between; padding:8px 0; font-size:14px; border-bottom:1px solid var(--border); }
  .summary-row:last-child { border-bottom:none; }
  .summary-row.total-row { font-size:16px; font-weight:700; padding-top:12px; }
  .summary-box { background:var(--surface2); border-radius:10px; padding:16px 20px; }
</style>
</head>
<body>
<script src="_sidebar.js"></script>
<script>injectSidebar('Dashboard');</script>

<main class="main">
  <div class="flex-gap" style="margin-bottom:28px">
    <a href="Dashboard.html" class="btn btn-ghost btn-icon">←</a>
    <div class="page-title" style="font-size:28px">Edit Booking</div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Booking Details</div></div>
    <div class="card-body">
      <form onsubmit="handleUpdate(event)">

        <!-- Customer (read-only) -->
        <div class="form-grid" style="margin-bottom:18px">
          <div class="form-group">
            <label class="form-label">Customer Name</label>
            <input class="form-input" value="Aravind Sharma" disabled style="opacity:.6;cursor:not-allowed" />
          </div>
          <div class="form-group">
            <label class="form-label">Customer Phone</label>
            <input class="form-input" value="9876543210" disabled style="opacity:.6;cursor:not-allowed" />
          </div>
        </div>

        <!-- Room -->
        <div class="form-group">
          <label class="form-label">Select Room *</label>
          <select class="form-select" id="room-select" onchange="recalculate()">
            <option value="3200" selected>101 – Presidential Suite (₹3,200/day)</option>
            <option value="2100">201 – Ocean Suite (₹2,100/day)</option>
            <option value="1400">301 – Deluxe King (₹1,400/day)</option>
            <option value="1100">401 – Ultra Deluxe (₹1,100/day)</option>
            <option value="700">501 – Standard Double (₹700/day)</option>
          </select>
        </div>

        <!-- Dates -->
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Check-in Date *</label>
            <input type="date" class="form-input" id="checkin" value="2026-03-20" onchange="recalculate()" required />
          </div>
          <div class="form-group">
            <label class="form-label">Check-out Date *</label>
            <input type="date" class="form-input" id="checkout" value="2026-03-25" onchange="recalculate()" required />
          </div>
        </div>

        <!-- Tax -->
        <div class="form-group">
          <label class="form-label">Tax Percentage (%)</label>
          <input type="number" class="form-input" id="tax-pct" value="12" min="0" max="100" step="0.01" onchange="recalculate()" style="max-width:200px" />
        </div>

        <!-- Advance -->
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Total Advance Paid</label>
            <input type="number" class="form-input" id="advance-paid" value="10000" disabled style="opacity:.6;cursor:not-allowed" />
          </div>
          <div class="form-group">
            <label class="form-label">Additional Payment</label>
            <input type="number" class="form-input" id="extra-payment" value="0" min="0" step="0.01" placeholder="Enter amount received" onchange="recalculate()" />
          </div>
        </div>

        <!-- Summary -->
        <div class="summary-box" style="margin-bottom:18px">
          <div class="summary-row"><span style="color:var(--muted)">Base Amount</span><strong id="s-base">—</strong></div>
          <div class="summary-row"><span style="color:var(--muted)" id="tax-label">Tax (12%)</span><strong id="s-tax">—</strong></div>
          <div class="summary-row total-row"><span>Total Amount</span><span style="color:var(--primary)" id="s-total">—</span></div>
          <div class="summary-row total-row"><span style="color:var(--danger)">Pending Amount</span><span style="color:var(--danger)" id="s-pending">—</span></div>
        </div>

        <!-- Status -->
        <div class="form-group">
          <label class="form-label">Booking Status *</label>
          <select class="form-select" id="booking-status" style="max-width:260px">
            <option value="confirmed">Confirmed</option>
            <option value="checked_in" selected>Checked In</option>
            <option value="checked_out">Checked Out</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>

        <!-- Notes -->
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="notes" placeholder="Optional notes…">Airport pickup requested.</textarea>
        </div>

        <div class="flex-gap">
          <button type="submit" class="btn btn-primary" id="update-btn">✅ Update Booking</button>
          <a href="Dashboard.html" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</main>

<script>
function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

function recalculate() {
  const rate = parseFloat(document.getElementById('room-select').value) || 0;
  const checkIn = document.getElementById('checkin').value;
  const checkOut = document.getElementById('checkout').value;
  const taxPct = parseFloat(document.getElementById('tax-pct').value) || 0;
  const advancePaid = parseFloat(document.getElementById('advance-paid').value) || 0;
  const extraPayment = parseFloat(document.getElementById('extra-payment').value) || 0;

  let days = 0;
  if (checkIn && checkOut) days = Math.max(0, (new Date(checkOut) - new Date(checkIn)) / 86400000);

  const base = days * rate;
  const tax = base * (taxPct / 100);
  const total = base + tax;
  const totalAdvance = advancePaid + extraPayment;
  const pending = Math.max(0, total - totalAdvance);

  document.getElementById('s-base').textContent = fmt(base);
  document.getElementById('tax-label').textContent = `Tax (${taxPct}%)`;
  document.getElementById('s-tax').textContent = fmt(tax);
  document.getElementById('s-total').textContent = fmt(total);
  document.getElementById('s-pending').textContent = fmt(pending);
}

function handleUpdate(e) {
  e.preventDefault();
  const btn = document.getElementById('update-btn');
  btn.textContent = 'Updating…'; btn.disabled = true;
  setTimeout(() => {
    alert('Booking updated successfully!');
    window.location.href = 'Dashboard.html';
  }, 1000);
}

recalculate();
</script>
</body>
</html>
