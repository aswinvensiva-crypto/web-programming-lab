<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>New Booking – Hotel Manager</title>
<link rel="stylesheet" href="_shared.css" />
<style>
  .booking-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:900px){ .booking-grid { grid-template-columns:1fr; } }
  .toggle-check { display:flex; align-items:center; gap:10px; margin-bottom:16px; cursor:pointer; }
  .toggle-check input { width:18px; height:18px; accent-color:var(--primary); cursor:pointer; }
  .summary-row { display:flex; justify-content:space-between; padding:8px 0; font-size:14px; }
  .summary-row.total { border-top:1px solid var(--border); padding-top:12px; font-weight:700; font-size:16px; }
  .summary-row.pending { color:var(--danger); font-weight:700; }
  .summary-box { background:var(--surface2); border-radius:10px; padding:16px; margin-bottom:16px; }
  .receipt-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:300; align-items:center; justify-content:center; }
  .receipt-modal.open { display:flex; }
  .receipt-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; max-width:480px; width:100%; }
  .receipt-title { font-family:'Playfair Display',serif; font-size:24px; text-align:center; margin-bottom:6px; }
  .receipt-id { text-align:center; color:var(--muted); font-size:12px; margin-bottom:24px; }
  .receipt-row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px solid var(--border); }
</style>
</head>
<body>
<script src="_sidebar.js"></script>
<script>injectSidebar('New Booking');</script>

<main class="main">
  <div class="flex-gap" style="margin-bottom:28px">
    <a href="Dashboard.html" class="btn btn-ghost btn-icon">←</a>
    <div class="page-title" style="font-size:28px">New Booking</div>
  </div>

  <form id="booking-form" onsubmit="handleSubmit(event)">
    <div class="booking-grid">

      <!-- Customer Details -->
      <div class="card">
        <div class="card-header"><div class="card-title">Customer Details</div></div>
        <div class="card-body">
          <label class="toggle-check">
            <input type="checkbox" id="new-cust" onchange="toggleCustomer()" />
            <span style="font-size:14px;font-weight:600">New Customer</span>
          </label>

          <div id="existing-customer">
            <div class="form-group">
              <label class="form-label">Select Customer *</label>
              <select class="form-select" id="customer-select">
                <option value="">– Select Customer –</option>
                <option value="1">Aravind Sharma – 9876543210</option>
                <option value="2">Priya Nair – 9123456789</option>
                <option value="3">Rajan Mehta – 9988776655</option>
              </select>
            </div>
          </div>

          <div id="new-customer-fields" style="display:none">
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Name *</label><input class="form-input" placeholder="Full name" required /></div>
              <div class="form-group"><label class="form-label">Phone *</label><input class="form-input" placeholder="Mobile number" required /></div>
            </div>
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="Optional" /></div>
              <div class="form-group"><label class="form-label">Address</label><input class="form-input" placeholder="Optional" /></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Booking Details -->
      <div class="card">
        <div class="card-header"><div class="card-title">Booking Details</div></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">Select Room *</label>
            <select class="form-select" id="room-select" onchange="recalculate()">
              <option value="">– Select Room –</option>
              <option value="3200">101 – Presidential Suite (₹3,200/day)</option>
              <option value="2100">201 – Ocean Suite (₹2,100/day)</option>
              <option value="1400">301 – Deluxe King (₹1,400/day)</option>
              <option value="1100">401 – Ultra Deluxe (₹1,100/day)</option>
              <option value="700">501 – Standard Double (₹700/day)</option>
            </select>
            <div id="room-info" style="font-size:12px;color:var(--muted);margin-top:6px"></div>
          </div>
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Check-in Date *</label><input type="date" class="form-input" id="checkin" onchange="recalculate()" required /></div>
            <div class="form-group"><label class="form-label">Check-out Date *</label><input type="date" class="form-input" id="checkout" onchange="recalculate()" required /></div>
          </div>
          <div class="form-group">
            <label class="form-label">Booking Status</label>
            <select class="form-select" id="booking-status">
              <option value="confirmed">Confirmed</option>
              <option value="checked_in">Checked In</option>
              <option value="checked_out">Checked Out</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Payment Details -->
      <div class="card">
        <div class="card-header"><div class="card-title">Payment Details</div></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Tax Percentage (%)</label><input type="number" class="form-input" id="tax-pct" value="0" min="0" max="100" step="0.01" onchange="recalculate()" /></div>
            <div class="form-group"><label class="form-label">Advance Paid (₹)</label><input type="number" class="form-input" id="advance" value="0" min="0" step="0.01" onchange="recalculate()" /></div>
          </div>
          <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="notes" placeholder="Additional notes…"></textarea></div>
        </div>
      </div>

      <!-- Billing Summary -->
      <div class="card">
        <div class="card-header"><div class="card-title">Billing Summary</div></div>
        <div class="card-body">
          <div class="summary-box">
            <div class="summary-row"><span style="color:var(--muted)">Total Days</span><strong id="s-days">0 days</strong></div>
            <div class="summary-row"><span style="color:var(--muted)">Room Rate</span><strong id="s-rate">₹0/day</strong></div>
            <div class="summary-row"><span style="color:var(--muted)">Base Amount</span><strong id="s-base">₹0</strong></div>
            <div class="summary-row"><span style="color:var(--muted)" id="tax-label">Tax (0%)</span><strong id="s-tax">₹0</strong></div>
            <div class="summary-row total"><span>Total Amount</span><span style="color:var(--primary)" id="s-total">₹0</span></div>
            <div class="summary-row"><span style="color:var(--muted)">Advance Paid</span><strong style="color:var(--success)" id="s-advance">₹0</strong></div>
            <div class="summary-row pending"><span>Pending Amount</span><span id="s-pending">₹0</span></div>
          </div>
          <div class="flex-gap">
            <button type="submit" class="btn btn-primary" style="flex:1" id="submit-btn">✅ Create Booking</button>
            <a href="Dashboard.html" class="btn btn-outline">Cancel</a>
          </div>
        </div>
      </div>
    </div>
  </form>

  <!-- Receipt Modal -->
  <div class="receipt-modal" id="receipt-modal">
    <div class="receipt-box">
      <div style="text-align:center;font-size:32px;margin-bottom:8px">🧾</div>
      <div class="receipt-title">Booking Confirmed!</div>
      <div class="receipt-id" id="r-id">BK-XXXXXXXX</div>
      <div id="receipt-rows"></div>
      <div class="flex-gap" style="margin-top:20px;justify-content:center">
        <button class="btn btn-primary" onclick="window.print()">🖨 Print</button>
        <a href="Dashboard.html" class="btn btn-outline">← Dashboard</a>
      </div>
    </div>
  </div>
</main>

<script>
function toggleCustomer() {
  const isNew = document.getElementById('new-cust').checked;
  document.getElementById('existing-customer').style.display = isNew ? 'none' : 'block';
  document.getElementById('new-customer-fields').style.display = isNew ? 'block' : 'none';
}

function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

function recalculate() {
  const rateEl = document.getElementById('room-select');
  const rate = parseFloat(rateEl.value) || 0;
  const checkIn = document.getElementById('checkin').value;
  const checkOut = document.getElementById('checkout').value;
  const taxPct = parseFloat(document.getElementById('tax-pct').value) || 0;
  const advance = parseFloat(document.getElementById('advance').value) || 0;

  let days = 0;
  if (checkIn && checkOut) {
    days = Math.max(0, (new Date(checkOut) - new Date(checkIn)) / 86400000);
  }
  const base = days * rate;
  const tax = base * (taxPct / 100);
  const total = base + tax;
  const pending = total - advance;

  document.getElementById('s-days').textContent = days + ' day' + (days !== 1 ? 's' : '');
  document.getElementById('s-rate').textContent = fmt(rate) + '/day';
  document.getElementById('s-base').textContent = fmt(base);
  document.getElementById('tax-label').textContent = `Tax (${taxPct}%)`;
  document.getElementById('s-tax').textContent = fmt(tax);
  document.getElementById('s-total').textContent = fmt(total);
  document.getElementById('s-advance').textContent = fmt(advance);
  document.getElementById('s-pending').textContent = fmt(Math.max(0, pending));
}

function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Creating…'; btn.disabled = true;
  setTimeout(() => {
    const rateEl = document.getElementById('room-select');
    const rate = parseFloat(rateEl.value) || 0;
    const checkIn = document.getElementById('checkin').value;
    const checkOut = document.getElementById('checkout').value;
    const days = Math.max(0, (new Date(checkOut) - new Date(checkIn)) / 86400000);
    const base = days * rate;
    const taxPct = parseFloat(document.getElementById('tax-pct').value) || 0;
    const tax = base * (taxPct / 100);
    const total = base + tax;
    const advance = parseFloat(document.getElementById('advance').value) || 0;

    const id = 'BK-' + Math.random().toString(36).substr(2,8).toUpperCase();
    document.getElementById('r-id').textContent = id;
    document.getElementById('receipt-rows').innerHTML = [
      ['Check-in', checkIn], ['Check-out', checkOut], ['Days', days],
      ['Base Amount', fmt(base)], [`Tax (${taxPct}%)`, fmt(tax)],
      ['Total Amount', fmt(total)], ['Advance Paid', fmt(advance)],
      ['Pending', fmt(Math.max(0, total - advance))]
    ].map(([k,v]) => `<div class="receipt-row"><span style="color:var(--muted)">${k}</span><strong>${v}</strong></div>`).join('');
    document.getElementById('receipt-modal').classList.add('open');
    btn.textContent = '✅ Create Booking'; btn.disabled = false;
  }, 1000);
}
</script>
</body>
</html>
